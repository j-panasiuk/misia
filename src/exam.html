<!doctype html>

<title>Matma - Test 7</title>
<link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />
<link rel="stylesheet" href="./styles.css" />
<script type="module" src="./exam-component.js"></script>
<style>
  exam-component {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
  }

  header {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 0;
    padding: 1rem;
    background: var(--color-text);
  }

  main {
    width: 100%;
    display: grid;
    place-items: center;
    flex: 1;
  }

  footer {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 0;
    padding: 1rem;
    background: var(--color-text);
  }

  nav {
    display: flex;
    gap: 0.5rem;

    a {
      text-decoration: none;
      background: slategray;
      color: gainsboro;
      font-size: 1.25rem;
      font-weight: 500;
      padding: 0.25rem 0.5rem;
      border-radius: 0.25rem;
    }
    a[aria-current="page"] {
      background: cadetblue;
      color: white;
    }
    a[aria-current="page"] ~ a {
      color: gainsboro;
    }
    a:hover {
      opacity: 0.8;
    }
  }
</style>

<exam-component>
  <header>
    <nav />
  </header>
  <main>
    <noscript>🤷‍♀️</noscript>
  </main>
  <footer>
    <nav />
  </footer>
</exam-component>
