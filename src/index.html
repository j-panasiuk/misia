<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width" />
<title>Matma</title>
<link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />
<link rel="stylesheet" href="./styles.css" />

<header>Matma</header>
<main>
  <section>
    <style>
      @scope {
        & {
          padding: 3rem;
          border-radius: 0.5rem;
          background: var(--note-orange-bg);
          margin-block: 1rem;
          font-family: fantasy;
          font-size: 1.5rem;
        }
      }
    </style>
    <h2>🙋‍♀️ Aloha!</h2>
    <script>
      // @ts-check
      document.currentScript?.replaceWith(
        sessionStorage.getItem("onboarded")
          ? document.createElement("activity-timeline")
          : document.createElement("welcome-card"),
      );
    </script>
  </section>

  <section>
    <style>
      @scope {
        & {
          display: grid;
          gap: 1rem;
          grid-template-columns: repeat(
            auto-fit,
            minmax(min(100%, 400px), 1fr)
          );
        }

        & > div {
          background: var(--color);
          border-radius: 0.5rem;
          font-family: fantasy;
          font-size: 1.5rem;

          &:hover {
            opacity: 0.8;
          }

          a {
            display: flex;
            padding: 3rem;
            text-align: center;
            text-decoration: none;
            color: inherit;
          }
        }
      }
    </style>
    <div style="--color: var(--note-green-bg)">
      <a href="./puzzle"><h2>🧩 Puzzle</h2></a>
    </div>
    <div style="--color: var(--note-blue-bg)">
      <a href="./exam"><h2>👩‍🎓 Test</h2></a>
    </div>
  </section>
</main>
