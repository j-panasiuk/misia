<!doctype html>
<head>
  <title>Matma</title>
  <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />
  <link rel="stylesheet" href="./styles.css" />
</head>

<header>Matma</header>
<main>
  <section>
    <style>
      @scope {
        & {
          padding: 3rem;
          background: var(--note-orange-bg);
          margin-block: 1rem;
        }
      }
    </style>
    <h2>Welcome!</h2>
    <script>
      // @ts-check
      document.currentScript?.replaceWith(
        sessionStorage.getItem("onboarded")
          ? document.createElement("activity-timeline")
          : document.createElement("welcome-card"),
      );
    </script>
  </section>

  <section>
    <style>
      @scope {
        & {
          display: grid;
          gap: 1rem;
          grid-template-columns: repeat(
            auto-fit,
            minmax(min(100%, 400px), 1fr)
          );
        }

        & > div {
          padding: 3rem;
          background: var(--color);
        }
      }
    </style>
    <div style="--color: var(--note-green-bg)">
      <h2>Puzzle</h2>
      <a href="/puzzle">Puzzle</a>
    </div>
    <div style="--color: var(--note-blue-bg)">
      <h2>Exam</h2>
      <a href="/exam">Exam</a>
    </div>
  </section>
</main>
